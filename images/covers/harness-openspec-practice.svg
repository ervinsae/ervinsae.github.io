      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="card" x1="180" y1="120" x2="1020" y2="510" gradientUnits="userSpaceOnUse">
